async function keyFromPw(pw){
  const base=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  return await crypto.subtle.deriveBits({name:"PBKDF2",salt:b2u(CFG.salt),iterations:CFG.it,hash:"SHA-256"},base,256);
}
async function tryOpen(rawBits){
  const key=await crypto.subtle.importKey("raw",rawBits,"AES-GCM",false,["decrypt"]);
  const ct=b2u(document.getElementById("ct").textContent.trim());
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2u(CFG.iv)},key,ct);
  const html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
}
window.addEventListener("DOMContentLoaded",async()=>{
  const saved=localStorage.getItem(KEYNAME);
  if(saved){try{await tryOpen(b2u(saved).buffer);return}catch(e){localStorage.removeItem(KEYNAME)}}
});
document.getElementById("f").addEventListener("submit",async ev=>{
  ev.preventDefault();
  const btn=document.getElementById("btn"),msg=document.getElementById("msg");
  btn.disabled=true;msg.textContent="확인 중...";msg.style.color="#8a919e";
  try{
    const raw=await keyFromPw(document.getElementById("pw").value);
    if(document.getElementById("rm").checked)localStorage.setItem(KEYNAME,u2b(raw));
    await tryOpen(raw);
  }catch(e){
    localStorage.removeItem(KEYNAME);
    msg.style.color="#ef4444";msg.textContent="비밀번호가 틀렸습니다";
    btn.disabled=false;
  }
});
</script></body></html>
