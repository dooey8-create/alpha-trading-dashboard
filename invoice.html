<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>인보이스 작성기 — It's Beauty Inc.</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="인보이스">
<meta name="theme-color" content="#1f5f93">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
:root{--bg:#0d1117;--panel:#161b22;--panel2:#1c2330;--border:#283040;--txt:#e6edf3;--muted:#8b949e;--dim:#6e7681;--green:#10b981;--amber:#f59e0b;--blue:#3b82f6;--cyan:#22d3ee;--ink:#1f5f93;}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:16px}
.app{display:grid;grid-template-columns:minmax(360px,470px) 1fr;gap:18px;max-width:1180px;margin:0 auto;align-items:start}
@media(max-width:880px){.app{grid-template-columns:1fr}}
.pane{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px}
h2{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:3px}
input,select{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--txt);padding:9px 10px;font-size:15px;font-family:inherit}
input:focus{outline:none;border-color:var(--cyan)}
.r3{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.r1{margin-bottom:12px}
.ship{display:flex;gap:8px;margin-top:4px}
.ship button{flex:1;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:10px 4px;font-size:12px;font-weight:700;cursor:pointer}
.ship button.on{background:rgba(16,185,129,.15);color:#5ee9b5;border-color:rgba(16,185,129,.5)}
.comm{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}
.comm b{color:#5ee9b5;font-size:14px}
.ith{display:grid;grid-template-columns:1fr 40px 40px 58px 24px;gap:5px;font-size:10px;color:var(--dim);margin-bottom:4px;padding:0 2px}
.it{display:grid;grid-template-columns:1fr 40px 40px 58px 24px;gap:5px;margin-bottom:5px;align-items:start}
.it input{padding:8px 7px;font-size:14px}
.it .x{background:none;border:none;color:#ff6b6b;font-size:18px;cursor:pointer;padding:6px 0}
.addbtn{width:100%;background:var(--panel2);border:1px dashed var(--border);color:var(--cyan);border-radius:8px;padding:9px;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.office{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:12px}
.office .l{font-size:11px;color:var(--amber);font-weight:700;margin-bottom:6px}
.office .r3{margin-bottom:0}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.btn{border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:800;cursor:pointer}
.btn.save{background:var(--ink);color:#fff}.btn.dash{background:var(--green);color:#06281c}
.btn.reset{background:var(--panel2);color:var(--muted);border:1px solid var(--border)}
.hint{font-size:11px;color:var(--dim);margin-top:10px;line-height:1.6}
/* custom autocomplete */
.acw{position:relative}
.acdd{position:absolute;left:0;right:0;top:calc(100% + 2px);z-index:60;background:#11161f;border:1px solid var(--cyan);border-radius:8px;max-height:240px;overflow:auto;display:none;box-shadow:0 10px 26px rgba(0,0,0,.55)}
.acdd.show{display:block}
.acdd .o{padding:10px 11px;font-size:13.5px;color:var(--txt);cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;gap:8px}
.acdd .o:last-child{border-bottom:none}
.acdd .o.hi,.acdd .o:active{background:var(--panel2)}
.acdd .o small{color:var(--cyan);font-weight:700;white-space:nowrap}
.acdd .o em{color:var(--dim);font-style:normal;font-size:11px}
/* invoice preview (v4) */
.paper{background:#fff;color:#1a1a1a;border-radius:8px;width:540px;max-width:100%;margin:0 auto;font-family:"Helvetica Neue",Arial,sans-serif;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.topband{height:8px;background:linear-gradient(90deg,var(--ink),#3a86c4)}
.pinner{padding:30px 30px 34px}
.pt{display:flex;justify-content:space-between;align-items:center}
.logorow{display:flex;align-items:center;gap:11px}
.logo{width:40px;height:40px;border-radius:9px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;letter-spacing:-1px}
.brand{font-size:22px;font-weight:900;color:#1a1a1a;letter-spacing:-.6px;line-height:1.05}
.caddr{font-size:11px;color:#555;font-weight:500;margin-top:11px;line-height:1.6}
.meta{text-align:right}.invtitle{font-size:32px;font-weight:900;color:#bcd0e4;letter-spacing:-1px;line-height:.9;margin-bottom:7px}
.plab{font-size:9px;color:#999;font-weight:700;letter-spacing:.8px}
.pcell{display:inline-block;border:1.5px solid var(--ink);border-radius:5px;padding:3px 10px;margin-top:2px;min-width:110px;text-align:center;background:#eef5fb;font-size:14px;font-weight:800;color:#1a3fa0}
.billrow{display:flex;justify-content:space-between;align-items:center;margin:24px 0 12px;gap:18px}
.pl{font-size:9px;color:#999;font-weight:700;letter-spacing:.8px}
.sbox{display:inline-block;border:2px solid var(--ink);border-radius:7px;padding:5px 13px;font-size:16px;font-weight:900;background:#eef5fb;color:#15243a;margin-top:4px}
.paddr{font-size:13px;color:#333;font-weight:600;margin-top:6px}.paddr .zip{background:#e6eff9;padding:0 4px;border-radius:3px}
.pdate{text-align:right;white-space:nowrap}
.ptab{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px}
.ptab th{background:var(--ink);color:#fff;padding:9px 8px;text-align:left;font-size:10px;font-weight:700;border:1px solid #3a78a8}
.ptab th.n,.ptab td.n{text-align:right}.ptab th.c,.ptab td.c{text-align:center}
.ptab td{border:1px solid #e0e0e0;padding:10px 8px}
.ptab tbody tr:nth-child(even){background:#f7f9fb}
.ptab td.itx{color:#222;font-weight:700}.ptab .hw{color:#1a3fa0;font-weight:800}
.pbot{display:flex;justify-content:space-between;align-items:flex-start;margin-top:6px;gap:18px}
.pleg{font-size:8px;color:#aaa;line-height:1.7}
.ptot{width:230px;font-size:12px}.ptot .pr{display:flex;justify-content:space-between;padding:5px 2px;color:#555}
.ptot .pr.disc{color:#b3261e}
.ptot .pr.grand{border-top:2px solid #1a1a1a;margin-top:5px;padding-top:9px;font-size:14px;font-weight:900;color:#1a1a1a;align-items:center}
.ptot .pr.grand .v{font-size:17px;border:2px solid var(--ink);border-radius:6px;padding:4px 16px;background:#eef5fb;color:var(--ink)}
.pthanks{font-size:11px;font-weight:600;color:#aaa;margin-top:24px}
.pmethod{display:flex;gap:16px;font-size:10.5px;margin-top:18px;align-items:center;border-top:1px dashed #ddd;padding-top:9px;color:#555}
.pmethod .ml{font-weight:700;color:#333}
.pmethod .opt{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.pmethod .box{width:12px;height:12px;border:1.5px solid #888;border-radius:3px;display:inline-flex;align-items:center;justify-content:center;color:#333;font-size:9px;flex-shrink:0}
@media print{body *{visibility:hidden}#pv,#pv *{visibility:visible}#pv{position:absolute;left:0;top:0;width:100%}.paper{box-shadow:none;margin:0;width:100%}}
</style></head><body>
<div class="app">
  <div class="pane">
    <h2>🧾 인보이스 작성</h2>
    <div class="r3">
      <div><label>Invoice #</label><input id="invno"></div>
      <div><label>Date</label><input type="date" id="date"></div>
    </div>
    <div class="r1 acw"><label>가게 (눌러서 선택/검색)</label><input id="store" placeholder="가게 누르면 목록, 입력하면 검색" autocomplete="off"></div>
    <div class="r1"><label>Shipping (커미션 자동)</label>
      <div class="ship" id="ship">
        <button data-s="Visit" data-r="17">Visit 17%</button>
        <button data-s="Self Ship" data-r="12">Self Ship 12%</button>
        <button data-s="Company Ship" data-r="10">Company 10%</button>
      </div>
      <div class="comm" id="comm">커미션: <b>$0.00</b></div>
    </div>
    <h2 style="margin-top:8px">📦 품목 <span style="font-weight:400;color:var(--dim);font-size:11px">— 품목칸 누르면 목록 열림</span></h2>
    <div class="ith"><span>Description</span><span>Pack</span><span>Qty</span><span>Unit$</span><span></span></div>
    <div id="rows"></div>
    <button class="addbtn" id="add">＋ 항목 추가</button>
    <div class="office">
      <div class="l">조정 (손님 인보이스엔 안 보임)</div>
      <div class="r3">
        <div><label>Discount $</label><input type="number" id="disc" value="0" step="0.01"></div>
        <div><label>Return $</label><input type="number" id="ret" value="0" step="0.01"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn save" id="save">💾 PDF 저장/인쇄</button>
      <button class="btn dash" id="exp">📤 대시보드용 저장</button>
    </div>
    <button class="btn reset" id="reset" style="width:100%;margin-top:10px">초기화</button>
    <div class="hint">• <b>품목칸/가게칸을 한 번 누르면</b> 목록이 바로 열림 → 선택하거나 입력해서 검색.<br>• 가게+품목 알면 단가 자동. 새 품목은 자동 학습돼 다음에 뜸.<br>• <b>💾 PDF 저장</b> = 인보이스만 인쇄/PDF. <b>📤 대시보드용 저장</b> = 주문 데이터 파일을 받아 처리대기에 넣으면 대시보드에 반영됨.</div>
  </div>
  <div class="pane" id="pv"></div>
</div>

const LS={no:'ib_invno',items:'ib_items',prices:'ib_prices'};
const $=s=>document.querySelector(s);
function norm(s){return (s||'').toUpperCase().replace(/\s+/g,' ').trim();}
let learned=JSON.parse(localStorage.getItem(LS.items)||'[]');
let learnedPx=JSON.parse(localStorage.getItem(LS.prices)||'{}');
function allItems(){const s=new Set(DATA.items.map(i=>i.name));learned.forEach(x=>s.add(x));return [...s].sort();}
function curStore(){return DATA.stores.find(s=>s.store===$('#store').value)||DATA.stores.find(s=>norm(s.store)===norm($('#store').value));}
function priceFor(store,itemName){const k=store+'|'+norm(itemName);if(learnedPx[k])return learnedPx[k];
  const pbs=DATA.pricesByStore[store];if(pbs&&pbs[norm(itemName)])return pbs[norm(itemName)];
  const g=DATA.items.find(i=>i.name===norm(itemName));return g?g.price:'';}
function packFor(itemName){const g=DATA.items.find(i=>i.name===norm(itemName));return g?g.pack:1;}

// ---- custom autocomplete (opens on focus/click, filters on type, touch-friendly) ----
function attachAC(input, optionsFn, onPick){
  const dd=document.createElement('div');dd.className='acdd';
  input.parentNode.appendChild(dd);
  let hi=-1, opts=[];
  function build(){
    const q=norm(input.value);
    const all=optionsFn();
    opts=q? all.filter(o=>norm(o.label).includes(q)) : all;
    opts=opts.slice(0,60);
    dd.innerHTML=opts.map((o,i)=>`<div class="o" data-i="${i}">${o.label}${o.sub?`<small>${o.sub}</small>`:''}</div>`).join('')||'<div class="o"><em>일치 항목 없음 (새로 입력하면 저장됨)</em></div>';
    dd.querySelectorAll('.o[data-i]').forEach(el=>{
      el.addEventListener('mousedown',e=>{e.preventDefault();pick(+el.dataset.i);});
      el.addEventListener('touchstart',e=>{e.preventDefault();pick(+el.dataset.i);},{passive:false});
    });
    dd.classList.add('show');hi=-1;
  }
  function pick(i){if(!opts[i])return;input.value=opts[i].value;dd.classList.remove('show');onPick&&onPick(opts[i]);}
  input.addEventListener('focus',build);
  input.addEventListener('click',build);
  input.addEventListener('input',()=>{build();});
  input.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('show'),180));
  input.addEventListener('keydown',e=>{
    if(!dd.classList.contains('show'))return;
    const els=dd.querySelectorAll('.o[data-i]');
    if(e.key==='ArrowDown'){hi=Math.min(hi+1,els.length-1);}
    else if(e.key==='ArrowUp'){hi=Math.max(hi-1,0);}
    else if(e.key==='Enter'){if(hi>=0){e.preventDefault();pick(hi);}return;}
    else if(e.key==='Escape'){dd.classList.remove('show');return;}
    else return;
    els.forEach((el,i)=>el.classList.toggle('hi',i===hi));
    if(els[hi])els[hi].scrollIntoView({block:'nearest'});
  });
}

let ship={s:'',r:0};
function addRow(desc='',pack='',qty='',unit=''){
  const d=document.createElement('div');d.className='it';
  d.innerHTML=`<div class="acw"><input class="d" placeholder="품목" value="${desc}" autocomplete="off"></div><input class="p" placeholder="1" value="${pack}" inputmode="numeric"><input class="q" placeholder="0" value="${qty}" inputmode="numeric"><input class="u" placeholder="0" value="${unit}" inputmode="decimal"><button class="x">×</button>`;
  $('#rows').appendChild(d);
  const di=d.querySelector('.d'),pi=d.querySelector('.p'),qi=d.querySelector('.q'),ui=d.querySelector('.u');
  attachAC(di,()=>allItems().map(n=>{const st=curStore();const pr=st?priceFor(st.store,n):'';return {label:n,value:n,sub:pr?('$'+pr):''};}),
    (o)=>{const st=curStore();const pr=st?priceFor(st.store,o.value):priceFor('',o.value);if(pr)ui.value=pr;if(!pi.value)pi.value=packFor(o.value);render();});
  di.addEventListener('change',()=>{const st=curStore();if(st){const pr=priceFor(st.store,di.value);if(pr&&!ui.value)ui.value=pr;}if(!pi.value)pi.value=packFor(di.value);render();});
  [di,pi,qi,ui].forEach(x=>x.addEventListener('input',render));
  d.querySelector('.x').addEventListener('click',()=>{d.remove();render();});
}
$('#add').onclick=()=>addRow();
// store autocomplete
attachAC($('#store'),()=>DATA.stores.slice().sort((a,b)=>a.store.localeCompare(b.store)).map(s=>({label:s.store,value:s.store,sub:s.region||''})),
  ()=>{const st=curStore();if(st){document.querySelectorAll('#rows .it').forEach(r=>{const di=r.querySelector('.d'),ui=r.querySelector('.u');if(di.value){const pr=priceFor(st.store,di.value);if(pr)ui.value=pr;}});}render();});

  ship={s:b.dataset.s,r:+b.dataset.r};render();});

function rows(){return [...document.querySelectorAll('#rows .it')].map(r=>({
  desc:r.querySelector('.d').value,pack:+r.querySelector('.p').value||1,qty:+r.querySelector('.q').value||0,unit:+r.querySelector('.u').value||0}));}
function money(n){return '$ '+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function calc(){const rs=rows();let sub=0;rs.forEach(r=>sub+=r.pack*r.qty*r.unit);const disc=+$('#disc').value||0,ret=+$('#ret').value||0;return {rs,sub,disc,ret,total:sub-disc-ret};}
function render(){
  const st=curStore();const {rs,sub,disc,ret,total}=calc();
  const trs=rs.map(r=>{const amt=r.pack*r.qty*r.unit;
    return `<tr><td class="itx">${r.desc||''}</td><td class="c">${r.pack||''}</td><td class="c hw">${r.qty||''}</td><td class="n">${r.unit?money(r.unit):''}</td><td class="n">${amt?money(amt):''}</td></tr>`;}).join('');
  let extra='';if(disc)extra+=`<div class="pr disc"><span>Discount</span><span>−${money(disc)}</span></div>`;if(ret)extra+=`<div class="pr disc"><span>Return</span><span>−${money(ret)}</span></div>`;
  let csz=st?(st.csz||''):'';csz=csz.replace(/(\d{5})\s*$/,'<span class="zip">$1</span>');
  let dt=$('#date').value;if(/^\d{4}-\d{2}-\d{2}$/.test(dt)){const[y,m,d]=dt.split('-');dt=m+' / '+d+' / '+y;}
  const sline=st?`${st.name} <span style="font-size:12px;color:var(--ink)">(${st.id})</span>`:( $('#store').value||'—');
  const bx=k=>`<span class="box">${ship.s===k?'✓':''}</span>`;
  $('#comm').innerHTML='커미션: <b>'+money(sub*ship.r/100)+'</b>'+(ship.s?' ('+ship.r+'%)':'');
  $('#pv').innerHTML=`<div class="paper"><div class="topband"></div><div class="pinner">
   <div class="pt"><div><div class="logorow"><div class="logo">IB</div><div class="brand">It's Beauty Inc.</div></div>
   <div class="caddr">41 Bancker St, Englewood, NJ 07631<br><b>Steven Lee</b>, Sales Manager &nbsp;·&nbsp; Tel 253-397-0748</div></div>
   <div class="meta"><div class="invtitle">INVOICE</div><div class="plab">INVOICE #</div><div class="pcell">${$('#invno').value||''}</div></div></div>
   <div class="billrow"><div><div class="pl">BILL TO</div><span class="sbox">${sline}</span>
   <div class="paddr">${st?((st.addr||'')+(csz?', '+csz:'')):''}</div></div>
   <div class="pdate"><div class="pl">DATE</div><div class="pcell">${dt||''}</div></div></div>
   <table class="ptab"><colgroup><col><col style="width:38px"><col style="width:38px"><col style="width:88px"><col style="width:92px"></colgroup>
   <thead><tr><th>Description</th><th class="c">Pack</th><th class="c">Qty</th><th class="n">Unit Price</th><th class="n">Amount</th></tr></thead>
   <tbody>${trs||'<tr><td class="itx" style="color:#ccc">—</td><td></td><td></td><td></td><td></td></tr>'}</tbody></table>
   <div class="pbot"><div class="pleg">Pack = units per pack<br>Qty = number of packs<br>Amount = Pack × Qty × Unit Price</div>
   <div class="ptot"><div class="pr"><span>Subtotal</span><span>${money(sub)}</span></div>${extra}<div class="pr grand"><span>TOTAL</span><span class="v">${money(total)}</span></div></div></div>
   <div class="pthanks">Thank you for your business</div>
   <div class="pmethod"><span class="ml">Shipping:</span><span class="opt">${bx('Visit')} Visit</span><span class="opt">${bx('Self Ship')} Self Ship</span><span class="opt">${bx('Company Ship')} Company Ship</span></div>
  </div></div>`;
}
function learn(){const st=curStore();rows().forEach(r=>{const nm=norm(r.desc);if(nm){if(!allItems().includes(nm))learned.push(nm);if(st&&r.unit)learnedPx[st.store+'|'+nm]=r.unit;}});
  localStorage.setItem(LS.items,JSON.stringify([...new Set(learned)]));localStorage.setItem(LS.prices,JSON.stringify(learnedPx));}
function bump(){const n=parseInt($('#invno').value,10);if(!isNaN(n)){localStorage.setItem(LS.no,n+1);$('#invno').value=n+1;}render();}
$('#save').onclick=()=>{learn();window.print();bump();};
$('#exp').onclick=()=>{
  const st=curStore();const {rs,sub,disc,ret,total}=calc();
  if(!st){alert('가게를 먼저 선택하세요');return;}
  const order={invoice_no:$('#invno').value,date:$('#date').value,store:st.name,id:st.id,
    address:st.addr,csz:st.csz,region:st.region,shipping:ship.s,commission_pct:ship.r,
    items:rs.filter(r=>r.desc&&r.qty),discount:disc,return:ret,subtotal:sub,total:total,source:'invoice_builder'};
  learn();
  const blob=new Blob([JSON.stringify(order,null,1)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`ORDER_${(st.name+'('+st.id+')').replace(/[\\/:*?"<>|]/g,'')}_${$('#date').value}.json`;
  document.body.appendChild(a);a.click();a.remove();
  alert('주문 데이터 저장됨 → 이 파일을 📥 처리대기 폴더에 넣으면 대시보드에 반영됩니다.');bump();
};
$('#reset').onclick=()=>{$('#rows').innerHTML='';$('#store').value='';$('#disc').value=0;$('#ret').value=0;
  document.querySelectorAll('#ship button').forEach(x=>x.classList.remove('on'));ship={s:'',r:0};addRow();addRow();render();};
$('#invno').value=localStorage.getItem(LS.no)||'252610';
$('#date').value=new Date().toISOString().slice(0,10);
addRow();addRow();addRow();render();
</script><script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));}</script>
</body></html>
