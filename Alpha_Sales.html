<style>
:root{--g:#0f6e56;--g2:#e1f5ee;--red:#a32d2d;--red2:#fcebeb;--amb:#854f0b;--amb2:#faeeda;
--bg:#f3f4f6;--card:#fff;--txt:#111827;--muted:#6b7280;--border:#e5e7eb;--blue:#185fa5;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--txt);
padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 16px);font-size:14px}
.top{position:sticky;top:0;z-index:10;background:var(--g);color:#fff;padding:12px 14px 10px;}
.top h1{font-size:16px;font-weight:800;display:flex;justify-content:space-between;align-items:center;}
.top .asof{font-size:10px;font-weight:400;opacity:.85;}
.top input{width:100%;margin-top:8px;padding:9px 12px;border:none;border-radius:9px;font-size:14px;background:rgba(255,255,255,.95);}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 14px 2px;-webkit-overflow-scrolling:touch;}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:5px 12px;border-radius:14px;font-size:12px;font-weight:600;background:#fff;border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;}
.chip.on{background:var(--g);color:#fff;border-color:var(--g);}
.wrap{padding:8px 12px;}
.card{background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;}
.row .nm{font-weight:700;font-size:14px;}
.row .sub{font-size:11px;color:var(--muted);margin-top:2px;}
.badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;white-space:nowrap;}
.b-red{background:var(--red2);color:var(--red);}
.b-amb{background:var(--amb2);color:var(--amb);}
.b-ok{background:var(--g2);color:var(--g);}
.detail{border:2px solid var(--g);}
.btnrow{display:flex;gap:8px;margin-top:10px;}
.btn{flex:1;padding:10px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:block;}
.btn.map{background:var(--blue);color:#fff;}
.btn.inv{background:var(--g);color:#fff;}
.btn.gray{background:#e5e7eb;color:var(--txt);}
.sec{font-size:11px;font-weight:800;color:var(--muted);margin:12px 0 5px;}
table{width:100%;border-collapse:collapse;font-size:12.5px;}
td{padding:4px 2px;border-top:1px solid #f3f4f6;}
.r{text-align:right;font-variant-numeric:tabular-nums;}
.muted{color:var(--muted);}
.red{color:var(--red);font-weight:700;}
.green{color:var(--g);font-weight:700;}
.pxsearch{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;margin-bottom:4px;}
.empty{padding:20px;text-align:center;color:var(--muted);font-size:13px;}
.routebar{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.done .nm{text-decoration:line-through;opacity:.45;}
.done .sub,.done .badge{opacity:.45;}
.chk{width:22px;height:22px;flex:0 0 22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;cursor:pointer;}
.chk.on{background:var(--g);border-color:var(--g);}
.foot{font-size:10px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6;}
</style>
</head>

<div class="chips" id="regions"></div>

let region = localStorage.getItem('as_region') || '';
let mode = localStorage.getItem('as_mode') || 'list';
let sortBy = localStorage.getItem('as_sort') || 'out';
let sel = null;
let visited = JSON.parse(localStorage.getItem('as_visited_' + today()) || '{}');
function today(){ return new Date().toISOString().slice(0,10); }
function fm(x){ return '$' + (x||0).toLocaleString(undefined,{maximumFractionDigits:0}); }
function daysSince(d){ if(!d) return null; return Math.round((new Date(today()) - new Date(d)) / 864e5); }

function outOf(o){ return (FIELD.outstanding[o]||[]).reduce((a,r)=>a+(r.amt||0),0); }
function holdOf(o){ return (FIELD.hold[o]||[]).reduce((a,r)=>a+(r.sale||0),0); }
function lastOrder(o){ const r = FIELD.recent[o]||[]; return r.length ? r[0].d : null; }

function init(){
  document.getElementById('asof').textContent = FIELD.asof ? '기준 ' + FIELD.asof : '';
  document.getElementById('asof2').textContent = FIELD.asof || '—';
  const regs = [...new Set(ACCOUNTS.accounts.map(a=>a.region).filter(Boolean))].sort();
  let h = '<span class="chip' + (region===''?' on':'') + '" onclick="setRegion(\'\')">전체</span>';
  regs.forEach(r=>{ h += '<span class="chip' + (region===r?' on':'') + '" onclick="setRegion(\'' + r + '\')">' + r + '</span>'; });
  document.getElementById('regions').innerHTML = h;
  render();
}
function setRegion(r){ region=r; localStorage.setItem('as_region', r); sel=null; init(); }
function setMode(m){ mode=m; localStorage.setItem('as_mode', m); sel=null; render(); }
function sortNext(){
  sortBy = sortBy==='out' ? 'days' : sortBy==='days' ? 'name' : 'out';
  localStorage.setItem('as_sort', sortBy); render();
}
const SORT_LABEL = {out:'미수순', days:'오래된순', name:'이름순'};

function filtered(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  return ACCOUNTS.accounts.filter(a=>{
    if(region && a.region!==region) return false;
    if(!q) return true;
    return (a.official + ' ' + a.id + ' ' + (a.crdl_aliases||[]).join(' ')).toLowerCase().includes(q);
  }).sort((a,b)=>{
    if(sortBy==='name') return a.name < b.name ? -1 : 1;
    if(sortBy==='days'){ const x=daysSince(lastOrder(a.official)) ?? 9999, y=daysSince(lastOrder(b.official)) ?? 9999; return y - x; }
    return (outOf(b.official)+holdOf(b.official)) - (outOf(a.official)+holdOf(a.official));
  });
}

function render(){
  document.getElementById('modeList').className = 'chip' + (mode==='list'?' on':'');
  document.getElementById('modeRoute').className = 'chip' + (mode==='route'?' on':'');
  document.getElementById('sortChip').textContent = '정렬: ' + SORT_LABEL[sortBy];
  renderDetail();
  const list = filtered();
  if(!list.length){ document.getElementById('list').innerHTML = '<div class="empty">검색 결과 없음</div>'; return; }
  let h = '';
  if(mode==='route'){
    const doneN = list.filter(a=>visited[a.official]).length;
    h += '<div class="card routebar"><b style="font-size:13px;">오늘 방문 ' + doneN + '/' + list.length + '</b>'
       + '<span style="flex:1"></span><span class="chip" onclick="resetVisited()">리셋</span></div>';
  }
  list.forEach(a=>{
    const o = a.official, out = outOf(o), hold = holdOf(o), ds = daysSince(lastOrder(o));
    const isDone = mode==='route' && visited[o];
    let badges = '';
    if(out) badges += '<span class="badge b-red">미수 ' + fm(out) + '</span>';
    if(hold) badges += '<span class="badge b-amb">정산대기 ' + fm(hold) + '</span>';
    if(!out && !hold) badges += '<span class="badge b-ok">완납</span>';
    h += '<div class="card' + (isDone?' done':'') + '"><div class="row" onclick="show(\'' + o.replace(/'/g,"\\'") + '\')">';
    if(mode==='route') h += '<span class="chk' + (isDone?' on':'') + '" onclick="event.stopPropagation();toggleVisit(\'' + o.replace(/'/g,"\\'") + '\')">' + (isDone?'✓':'') + '</span>';
    h += '<div style="flex:1;"><div class="nm">' + o + '</div>'
       + '<div class="sub">' + (a.city_state_zip||'') + (ds!=null ? ' · 마지막 오더 ' + ds + '일 전' : ' · 거래기록 없음') + '</div></div>'
       + '<div style="text-align:right;display:flex;flex-direction:column;gap:3px;align-items:flex-end;">' + badges + '</div>'
       + '</div></div>';
  });
  document.getElementById('list').innerHTML = h;
}
function toggleVisit(o){
  visited[o] = !visited[o];
  if(!visited[o]) delete visited[o];
  localStorage.setItem('as_visited_' + today(), JSON.stringify(visited));
  render();
}
function resetVisited(){ visited = {}; localStorage.setItem('as_visited_' + today(), '{}'); render(); }

function show(official){
  sel = sel===official ? null : official;
  render();
  if(sel) window.scrollTo({top:0, behavior:'smooth'});
}
function renderDetail(){
  const el = document.getElementById('detail');
  if(!sel){ el.innerHTML=''; return; }
  const a = ACCOUNTS.accounts.find(x=>x.official===sel);
  if(!a){ el.innerHTML=''; return; }
  const o = a.official;
  const addr = (a.street||'') + (a.city_state_zip ? ', ' + a.city_state_zip : '');
  const pct = a.default_comm_pct ? Math.round(a.default_comm_pct*100) + '%' : '—';
  const grp = a.alias_group ? (ACCOUNTS.groups[a.alias_group]||[]).filter(x=>x!==o) : [];
  let h = '<div class="card detail">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">'
     + '<div><div style="font-size:16px;font-weight:800;">' + o + '</div>'
     + '<div class="sub" style="font-size:12px;color:var(--muted);margin-top:3px;">📍 ' + (addr||'주소 미입력') + '</div>'
     + '<div class="sub" style="font-size:11px;color:var(--muted);margin-top:2px;">' + (a.region||'') + ' · 기본 ' + pct
     + (a.discount_pct ? ' · 제품할인 ' + a.discount_pct + '%' : '') + ' · ' + (a.invoice_method||'') + '</div></div>'
     + '<button class="btn gray" style="flex:0 0 auto;padding:6px 10px;font-size:12px;" onclick="show(\'' + o.replace(/'/g,"\\'") + '\')">✕</button></div>';
  if(grp.length) h += '<div style="margin-top:6px;"><span class="badge b-amb">⚠ 혼동주의: ' + grp.join(', ') + '</span></div>';
  h += '<div class="btnrow">'
     + '<a class="btn map" href="https://maps.apple.com/?daddr=' + encodeURIComponent(addr) + '" target="_blank">🗺 길찾기</a>'
     + '<a class="btn inv" href="invoice.html#store=' + encodeURIComponent(o) + '" target="_blank">🧾 인보이스 작성</a></div>';

  const outs = FIELD.outstanding[o]||[];
  if(outs.length){
    h += '<div class="sec">💰 받을 돈 (미수·체크수령) — ' + fm(outOf(o)) + '</div><table>';
    outs.forEach(r=>{ h += '<tr><td class="muted">' + r.date + '</td><td class="r ' + (r.st==='green'?'green':'red') + '">' + fm(r.amt) + '</td><td class="muted" style="font-size:10.5px;">' + (r.st==='green'?'체크수령(입금대기)':'미수') + (r.note?' · '+r.note:'') + '</td></tr>'; });
    h += '</table>';
  }
  const holds = FIELD.hold[o]||[];
  if(holds.length){
    h += '<div class="sec">📄 정산서 수금대기 (CRDL hold)</div><table>';
    holds.forEach(r=>{ h += '<tr><td class="muted">' + (r.status||'') + '</td><td class="r">' + fm(r.sale) + '</td><td class="muted" style="font-size:10.5px;">' + r.pct + '%' + (r.note?' · '+r.note:'') + '</td></tr>'; });
    h += '</table>';
  }
  const rec = FIELD.recent[o]||[];
  if(rec.length){
    h += '<div class="sec">🧾 최근 주문</div><table>';
    rec.slice(0,5).forEach(r=>{ h += '<tr><td class="muted">' + r.d + '</td><td class="r">' + fm(r.a) + '</td><td class="muted" style="font-size:10.5px;">' + (r.dep ? '입금 ' + r.dep : '') + '</td></tr>'; });
    h += '</table>';
  }
  const px = PRICEBOOK[o];
  if(px && Object.keys(px).length){
    h += '<div class="sec">🏷 이 가게 단가 (' + Object.keys(px).length + '품목)</div>'
       + '<input class="pxsearch" placeholder="품목 검색" oninput="renderPx(this.value)">'
       + '<div id="pxlist"></div>';
  } else {
    h += '<div class="sec muted" style="font-weight:400;">단가 기록 없음 — 인보이스 만들면 자동 수집됨</div>';
  }
  h += '</div>';
  el.innerHTML = h;
  if(px) renderPx('');
}
function renderPx(q){
  const px = PRICEBOOK[sel]||{};
  const ql = (q||'').toUpperCase();
  let rows = Object.entries(px).filter(([k])=>!ql || k.includes(ql));
  rows.sort((a,b)=>a[0]<b[0]?-1:1);
  let h = '<table>';
  rows.slice(0,40).forEach(([k,v])=>{
    h += '<tr><td>' + k + '</td><td class="r">$' + v.p + '</td><td class="r muted" style="font-size:10px;">' + (v.d||'') + '</td></tr>';
  });
  h += '</table>' + (rows.length>40 ? '<div class="muted" style="font-size:10px;">외 ' + (rows.length-40) + '개 — 검색으로 좁히기</div>' : '');
  document.getElementById('pxlist').innerHTML = h;
}
init();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js"));}</script>
</body>
